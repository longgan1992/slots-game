<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍇 热带水果老虎机 🍓</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: linear-gradient(135deg, #1a0000 0%, #3d0000 50%, #1a0000 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #ffd700; overflow-x: hidden;
    padding: 10px;
  }
  .gold-text { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.6); }
  .header {
    text-align: center; margin: 10px 0;
  }
  .header h1 {
    font-size: 22px; letter-spacing: 2px;
    background: linear-gradient(90deg, #ffd700, #ff8c00, #ffd700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shimmer 2s infinite;
  }
  @keyframes shimmer {
    0%,100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
  }
  .info-bar {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; max-width: 400px; margin: 8px 0;
    background: rgba(0,0,0,0.4); border: 1px solid #8b6914;
    border-radius: 12px; padding: 8px 16px;
  }
  .balance-display, .bet-display {
    font-size: 13px;
  }
  .balance-display span, .bet-display span {
    font-size: 18px; font-weight: bold;
  }
  .balance-display span { color: #7fff00; }
  .bet-display span { color: #ff6600; }

  .slot-machine {
    position: relative;
    background: linear-gradient(180deg, #2d1a00 0%, #4a2800 100%);
    border: 4px solid #ffd700; border-radius: 16px;
    padding: 12px; width: 100%; max-width: 400px;
    box-shadow: 0 0 30px rgba(255,165,0,0.4), inset 0 0 20px rgba(0,0,0,0.5);
  }
  .reel-frame {
    display: flex; gap: 8px; justify-content: center;
    background: #0a0000; border: 2px solid #8b6914;
    border-radius: 10px; padding: 10px 6px;
    overflow: hidden;
  }
  .reel {
    width: 100px; height: 280px; overflow: hidden;
    border: 2px solid #5a3a00; border-radius: 6px;
    position: relative;
  }
  .reel-strip {
    display: flex; flex-direction: column; align-items: center;
    position: absolute; width: 100%;
    transition: top 0.1s linear;
  }
  .reel-strip.spinning {
    transition: none;
  }
  .symbol {
    width: 100px; height: 70px;
    display: flex; align-items: center; justify-content: center;
    font-size: 46px;
    border-bottom: 1px solid rgba(139,105,20,0.3);
  }
  .win-line {
    position: absolute; top: 50%; left: 0; right: 0;
    height: 74px; transform: translateY(-50%);
    border: 2px solid rgba(255,215,0,0.7);
    border-radius: 6px;
    pointer-events: none;
    box-shadow: 0 0 15px rgba(255,215,0,0.5);
    display: none;
    z-index: 10;
  }
  .win-line.active { display: block; }

  .controls {
    display: flex; gap: 8px; align-items: center; justify-content: center;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn {
    background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
    border: 2px solid #ffd700; border-radius: 25px;
    color: #1a0000; font-size: 14px; font-weight: bold;
    padding: 10px 20px; cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    min-width: 60px;
  }
  .btn:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-spin {
    background: linear-gradient(180deg, #ff4500 0%, #8b0000 100%);
    border-color: #ff6347; color: white;
    font-size: 18px; padding: 12px 36px;
  }
  .btn-max {
    background: linear-gradient(180deg, #ff6600 0%, #cc3300 100%);
    border-color: #ff8c00; color: white;
  }
  .btn-bet {
    background: linear-gradient(180deg, #daa520 0%, #8b6914 100%);
    border-color: #ffd700; color: white;
    font-size: 13px; padding: 8px 14px;
  }
  .btn-clear {
    background: linear-gradient(180deg, #444 0%, #222 100%);
    border-color: #666; color: #ccc; font-size: 12px; padding: 8px 12px;
  }

  .bet-selector {
    display: flex; gap: 4px; align-items: center; justify-content: center;
    margin-top: 8px;
  }
  .bet-selector span { font-size: 12px; color: #ffd700; margin-right: 4px; }

  .message {
    text-align: center; margin-top: 10px; font-size: 16px; font-weight: bold;
    min-height: 24px; color: #7fff00;
    text-shadow: 0 0 10px rgba(127,255,0,0.8);
  }
  .message.big-win { font-size: 22px; color: #ffd700; animation: pulse 0.5s infinite; }
  .message.lose { color: #ff4444; }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .payout-table {
    width: 100%; max-width: 400px; margin-top: 15px;
    background: rgba(0,0,0,0.5); border: 1px solid #8b6914;
    border-radius: 12px; padding: 10px 12px;
    max-height: 200px; overflow-y: auto;
  }
  .payout-table h3 {
    font-size: 14px; text-align: center; margin-bottom: 8px;
    color: #ffd700; letter-spacing: 1px;
  }
  .payout-grid {
    display: grid; grid-template-columns: repeat 6, 1fr; gap: 4px;
  }
  .payout-item {
    text-align: center; font-size: 11px; color: #ccc;
    background: rgba(255,255,255,0.05); border-radius: 4px;
    padding: 3px 2px;
  }
  .payout-item .fruit { font-size: 22px; display: block; }
  .payout-item .rate { color: #ffd700; font-weight: bold; }

  .history {
    display: flex; gap: 6px; align-items: center;
    margin-top: 8px; justify-content: center;
  }
  .history-item {
    width: 28px; height: 28px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; background: rgba(0,0,0,0.3);
    border: 1px solid #5a3a00;
  }
  .history-item.win { background: rgba(127,255,0,0.15); border-color: #7fff00; }
  .history-item.lose { background: rgba(255,0,0,0.1); border-color: #ff4444; }

  .payout-modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 100;
    align-items: center; justify-content: center;
  }
  .payout-modal.show { display: flex; }
  .payout-content {
    background: linear-gradient(180deg, #2d1a00, #1a0a00);
    border: 2px solid #ffd700; border-radius: 16px;
    padding: 20px; width: 90%; max-width: 360px;
    max-height: 80vh; overflow-y: auto;
  }
  .payout-content h2 {
    text-align: center; font-size: 18px; margin-bottom: 12px;
    color: #ffd700;
  }
  .payout-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid rgba(139,105,20,0.3);
    font-size: 13px;
  }
  .payout-row .combo { font-size: 24px; }
  .payout-row .desc { color: #ccc; flex: 1; margin-left: 8px; }
  .payout-row .pay { color: #7fff00; font-weight: bold; white-space: nowrap; }
  .close-btn {
    display: block; margin: 12px auto 0;
    background: #ffd700; color: #1a0000; border: none;
    border-radius: 20px; padding: 8px 30px; font-size: 14px; font-weight: bold;
    cursor: pointer;
  }

  .spin-counter {
    text-align: center; font-size: 11px; color: #888; margin-top: 4px;
  }

  @keyframes slideUp {
    0% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  .result-anim { animation: slideUp 0.3s ease-out; }
</style>
</head>
<body>

<div class="header">
  <h1>🍇 热带水果老虎机 🍓</h1>
</div>

<div class="info-bar">
  <div class="balance-display">💰 余额 <span id="balance">1000</span></div>
  <div class="history" id="history"></div>
  <div class="bet-display">🎯 下注 <span id="currentBet">10</span></div>
</div>

<div class="slot-machine">
  <div class="reel-frame">
    <div class="reel" id="reel0"><div class="reel-strip" id="strip0"></div></div>
    <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
    <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
    <div class="win-line" id="winLine"></div>
  </div>
  <div class="message" id="message"></div>
  <div class="spin-counter" id="spinCounter"></div>
  <div class="controls">
    <button class="btn btn-clear" onclick="resetBalance()">🔄 重置</button>
    <button class="btn btn-bet" onclick="changeBet(-1)">➖</button>
    <button class="btn btn-spin" id="spinBtn" onclick="spin()">🎰 拉霸</button>
    <button class="btn btn-bet" onclick="changeBet(1)">➕</button>
    <button class="btn btn-max" onclick="setMaxBet()">MAX</button>
  </div>
  <div class="bet-selector">
    <span>下注金额：</span>
    <button class="btn btn-bet" style="font-size:11px;padding:5px 8px;" onclick="setBet(1)">1</button>
    <button class="btn btn-bet" style="font-size:11px;padding:5px 8px;" onclick="setBet(5)">5</button>
    <button class="btn btn-bet" style="font-size:11px;padding:5px 8px;" onclick="setBet(10)">10</button>
    <button class="btn btn-bet" style="font-size:11px;padding:5px 8px;" onclick="setBet(50)">50</button>
    <button class="btn btn-bet" style="font-size:11px;padding:5px 8px;" onclick="setBet(100)">100</button>
  </div>
</div>

<div class="payout-table">
  <h3 onclick="showPayoutModal()" style="cursor:pointer">📋 点击查看完整赔付表 📋</h3>
  <div class="payout-grid" id="payoutGrid"></div>
</div>

<!-- 赔付表弹窗 -->
<div class="payout-modal" id="payoutModal">
  <div class="payout-content">
    <h2>🍒 赔付表 🍒</h2>
    <div id="payoutList"></div>
    <button class="close-btn" onclick="closePayoutModal()">关闭</button>
  </div>
</div>
